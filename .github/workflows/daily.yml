name: daily-market-shorts

on:
  schedule:
    - cron: "17 21 * * *"
    - cron: "17 23 * * *"
    - cron: "17 9 * * *"
    - cron: "17 13 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "시간대(slot)"
        type: choice
        default: morning
        options: [morning, preopen, close, uspreview]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg & Korean font
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-nanum
          sudo fc-cache -f
      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Decide slot
        id: slot
        run: |
          IN="${{ github.event.inputs.slot }}"
          if [ -n "$IN" ]; then
            echo "slot=$IN" >> "$GITHUB_OUTPUT"
          else
            H=$(date -u +%H)
            case "$H" in
              21) S=morning;;
              23) S=preopen;;
              09) S=close;;
              13) S=uspreview;;
              *)  S=morning;;
            esac
            echo "slot=$S" >> "$GITHUB_OUTPUT"
          fi
      - name: Run pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SLOT:             ${{ steps.slot.outputs.slot }}
        run: python run.py
      - name: Save outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-short-${{ github.run_id }}
          path: |
            data/short.mp4
            data/meta.json
          retention-days: 7
