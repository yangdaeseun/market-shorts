name: daily-market-shorts

on:
  schedule:
    # GitHub 예약은 정각(:00)을 자주 지연/누락시켜서 :17분으로 설정(더 안정적)
    - cron: "17 21 * * *"   # 06:17 KST  아침 브리핑(morning)
    - cron: "17 23 * * *"   # 08:17 KST  개장 직전(preopen)
    - cron: "17 9 * * *"    # 18:17 KST  마감 복기(close)
    - cron: "17 13 * * *"   # 22:17 KST  미국장 프리뷰(uspreview)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg & Korean font
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-nanum
          sudo fc-cache -f
      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Decide slot (KST 시간 기준 자동)
        id: slot
        run: |
          H=$(date -u -d '+9 hours' +%H)
          if [ "$H" -ge 3 ] && [ "$H" -lt 7 ]; then S=morning
          elif [ "$H" -ge 7 ] && [ "$H" -lt 12 ]; then S=preopen
          elif [ "$H" -ge 12 ] && [ "$H" -lt 20 ]; then S=close
          else S=uspreview; fi
          echo "slot=$S" >> "$GITHUB_OUTPUT"
      - name: Run pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SLOT:             ${{ steps.slot.outputs.slot }}
        run: python run.py
      - name: Save outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-short-${{ github.run_id }}
          path: |
            data/short.mp4
            data/meta.json
          retention-days: 7
